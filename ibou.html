<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pour Toi ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ffeef8;
            /* Arrière-plan avec motifs de cœurs */
            background-image: url('https://www.transparenttextures.com/patterns/hearts.png');
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        h1 {
            color: #d63384;
            text-shadow: 2px 2px white;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #btnOui {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
        }

        #btnNon {
            background-color: #adb5bd;
            color: white;
        }

        .hidden {
            display: none;
        }

        #messageFinal {
            font-size: 2.5rem;
            color: #ff4d6d;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div id="quiz">
        <h1>Veux-tu être ma Valentine ? ❤️</h1>
        <div class="buttons">
            <button id="btnOui">OUI !</button>
            <button id="btnNon">Non</button>
        </div>
    </div>

    <div id="messageFinal" class="hidden">
        ❤️ C'ETAIT SUR ! ❤️
        <br>
        <p style="font-size: 1.2rem; color: #333;">Voici notre chanson...</p>
        <iframe width="300" height="80" src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1" frameborder="0" allow="autoplay"></iframe>
    </div>

    <script>
        const btnOui = document.getElementById('btnOui');
        const btnNon = document.getElementById('btnNon');
        const quiz = document.getElementById('quiz');
        const messageFinal = document.getElementById('messageFinal');

        let tailleOui = 1.2; // Taille initiale en rem
        let tailleNon = 1.2;

        btnNon.addEventListener('mouseover', () => {
            // Le bouton OUI grandit
            tailleOui += 0.5;
            btnOui.style.fontSize = tailleOui + "rem";
            btnOui.style.padding = (tailleOui * 10) + "px " + (tailleOui * 20) + "px";

            // Le bouton NON rétrécit
            tailleNon -= 0.1;
            if (tailleNon < 0.2) tailleNon = 0; // Il finit par disparaître
            btnNon.style.fontSize = tailleNon + "rem";
            btnNon.style.padding = (tailleNon * 10) + "px " + (tailleNon * 20) + "px";
            
            if(tailleNon <= 0) {
                btnNon.style.display = 'none';
            }
        });

        btnOui.addEventListener('click', () => {
            quiz.classList.add('hidden');
            messageFinal.classList.remove('hidden');
            document.body.style.backgroundColor = "#ffc1cf";
        });
    </script>
</body>
</html>
