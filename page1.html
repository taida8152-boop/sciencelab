<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ScienceLab Virtuel - Labo Ultime</title>
<style>
/* ===== BODY ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0a0a0a, #1c1c1f);
    color: #ffffffcc;
    overflow-x: hidden;
}

/* ===== HEADER ===== */
header {
    background: rgba(0,0,0,0.8);
    padding: 30px;
    text-align: center;
    font-size: 36px;
    font-weight: bold;
    color: #00fff0;
    text-shadow: 0 0 10px #00fff0, 0 0 20px #00fff0aa;
    backdrop-filter: blur(15px);
}

/* ===== NAVBAR ===== */
nav {
    display: flex;
    justify-content: center;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(15px);
    flex-wrap: wrap;
}

nav button {
    background: none;
    border: 2px solid #00fff0;
    border-radius: 12px;
    color: #00fff0;
    padding: 14px 28px;
    margin: 10px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

nav button:hover {
    background: #00fff033;
    transform: scale(1.1);
    box-shadow: 0 0 20px #00fff0, 0 0 40px #00fff0aa inset;
}

/* ===== SECTIONS ===== */
.section {
    display: none;
    padding: 40px;
    text-align: center;
    animation: fade 0.6s ease;
}

.active {
    display: block;
}

@keyframes fade {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* ===== IFRAMES ===== */
iframe {
    margin-top: 25px;
    width: 90%;
    height: 500px;
    border-radius: 20px;
    border: 2px solid #00fff0;
    box-shadow: 0 0 25px #00fff0aa, 0 0 10px #00fff0 inset;
}

/* ===== LABO ===== */
#laboZone {
    width: 250px;
    height: 250px;
    margin: 40px auto;
    background: radial-gradient(circle at center, #111 0%, #222 100%);
    border-radius: 25px;
    box-shadow: 0 0 40px #00fff0, inset 0 0 25px #00fff0;
    transition: 0.5s;
    position: relative;
    overflow: hidden;
}

/* ===== LABO GLOW ANIMATION ===== */
@keyframes glowPulse {
    0%,100% { box-shadow: 0 0 30px #ff00ff, inset 0 0 20px #00ffff; }
    50% { box-shadow: 0 0 60px #ff00ff, inset 0 0 40px #00ffff; }
}

/* ===== BULLES ===== */
.bubble {
    position: absolute;
    bottom: 10px;
    width: 10px;
    height: 10px;
    background: #00ffff;
    border-radius: 50%;
    opacity: 0.8;
    animation: rise 3s linear infinite;
}

@keyframes rise {
    0% { transform: translateY(0) scale(1); opacity: 0.8;}
    50% { opacity: 1; }
    100% { transform: translateY(-200px) scale(1.5); opacity: 0;}
}

/* ===== BOUTONS LABO ===== */
button.action {
    margin: 10px;
    padding: 14px 28px;
    border: 2px solid #00fff0;
    border-radius: 15px;
    background: #111;
    color: #00fff0;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button.action:hover {
    background: #000;
    box-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff inset;
    transform: scale(1.1);
}

/* ===== RESULTAT ===== */
#resultat {
    font-size: 22px;
    color: #ffffffaa;
    margin-top: 20px;
    text-shadow: 0 0 5px #00fff0;
    transition: 0.3s;
}

/* ===== PULSING TEXT ===== */
.pulse {
    animation: pulseText 1s infinite alternate;
}

@keyframes pulseText {
    0% { text-shadow: 0 0 10px #ff00ff, 0 0 20px #00ffff; color: #ff00ff; }
    100% { text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff; color: #00ffff; }
}
</style>
</head>
<body>

<header>🔬 ScienceLab Virtuel</header>

<nav>
    <button onclick="show('home')">Accueil</button>
    <button onclick="show('college')">Collège</button>
    <button onclick="show('lycee')">Lycée</button>
    <button onclick="show('labo')">Labo</button>
</nav>

<!-- ACCUEIL -->
<div id="home" class="section active">
    <h1>Bienvenue 👋</h1>
    <p>Fais des expériences scientifiques interactives du collège à la terminale.</p>
</div>

<!-- COLLEGE -->
<div id="college" class="section">
    <h2>Collège</h2>
    <p>États de la matière, énergie, électricité</p>
    <iframe src="https://phet.colorado.edu/sims/html/states-of-matter/latest/states-of-matter_en.html"></iframe>
</div>

<!-- LYCEE -->
<div id="lycee" class="section">
    <h2>Lycée</h2>
    <p>Réactions chimiques, ondes, circuits</p>
    <iframe src="https://phet.colorado.edu/sims/html/circuit-construction-kit-dc/latest/circuit-construction-kit-dc_en.html"></iframe>
</div>

<!-- LABO INTERACTIF -->
<div id="labo" class="section">
    <h2>🧪 Labo Ultime</h2>
    <div id="laboZone"></div>
    <br>
    <button class="action" onclick="acide()">Ajouter Acide</button>
    <button class="action" onclick="base()">Ajouter Base</button>
    <button class="action" onclick="reset()">Reset</button>
    <p id="resultat">Aucune réaction</p>
</div>

<script>
/* NAVIGATION */
function show(id){
    document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* LABO */
let a = 0;
let b = 0;
const labo = document.getElementById("laboZone");
const resultat = document.getElementById("resultat");

function acide(){ a++; verifier(); }
function base(){ b++; verifier(); }

function verifier(){
    labo.innerHTML = '';
    if(a>0 && b>0){
        // Dégradé dynamique
        const pctA = Math.min(a*10, 100);
        const pctB = Math.min(b*10, 100);
        labo.style.background = `radial-gradient(circle at center, #ff00ff ${pctA}%, #00ffff ${pctB}%, #111 100%)`;
        labo.style.animation = "glowPulse 1.5s infinite alternate";
        resultat.innerHTML = "💥 <span class='pulse'>Réaction chimique réussie !</span>";

        // Ajout de bulles
        for(let i=0;i<5;i++){
            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            bubble.style.left = Math.random()*100 + '%';
            bubble.style.width = bubble.style.height = (5 + Math.random()*15) + 'px';
            bubble.style.background = (Math.random()<0.5)? '#ff00ff' : '#00ffff';
            labo.appendChild(bubble);
        }
    }
}

function reset(){
    a=0; b=0;
    labo.innerHTML = '';
    labo.style.background = 'radial-gradient(circle at center, #111 0%, #222 100%)';
    labo.style.animation = "none";
    resultat.innerHTML = "Aucune réaction";
}
</script>

</body>
</html>
