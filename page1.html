<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ScienceLab Ultime</title>

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0a0a0a;
  color: white;
  overflow-x: hidden;
}

/* BACKGROUND */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* HEADER */
header {
  text-align: center;
  padding: 30px;
  background: rgba(0,0,0,0.6);
}

header h1 { color: cyan; }

/* NAV */
nav {
  display: flex;
  justify-content: center;
  gap: 15px;
  padding: 20px;
}

nav a button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(145deg, cyan, blue);
  color: white;
  cursor: pointer;
}

/* SECTIONS */
section { padding: 60px 20px; text-align: center; }
h2 { color: cyan; }

/* CARDS */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: rgba(0,0,0,0.7);
  padding: 20px;
  border-radius: 15px;
  width: 260px;
  box-shadow: 0 0 15px cyan;
}

button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  background: cyan;
  color: black;
  border-radius: 8px;
  cursor: pointer;
}

/* ZONE SIMULATION */
.zone {
  height: 150px;
  background: black;
  border-radius: 10px;
  position: relative;
  margin-top: 10px;
}

/* POPUP */
#popup {
  position: fixed;
  top:0;left:0;width:100%;height:100%;
  background: rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

#popup-content {
  background:#111;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 20px cyan;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
  <h1>ScienceLab Virtuel 👨🏾‍🔬</h1>
</header>

<nav>
  <a href="#physique"><button>Physique</button></a>
  <a href="#chimie"><button>Chimie</button></a>
</nav>

<!-- PHYSIQUE -->
<section id="physique">
<h2>Physique ⚡</h2>

<div class="container">

<!-- CHUTE LIBRE -->
<div class="card">
<h3>Chute libre</h3>
<div class="zone">
<div id="balle" style="width:20px;height:20px;background:cyan;border-radius:50%;position:absolute;top:0;left:50%;"></div>
</div>
<button onclick="startFall()">Lancer</button>
</div>

<!-- PENDULE -->
<div class="card">
<h3>Pendule</h3>
<div class="zone">
<div id="pendule" style="width:2px;height:100px;background:cyan;margin:auto;transform-origin:top;"></div>
</div>
<button onclick="startPendule()">Démarrer</button>
</div>

<!-- ELECTRICITE -->
<div class="card">
<h3>Électricité</h3>
<button onclick="testConducteur('metal')">Métal</button>
<button onclick="testConducteur('bois')">Bois</button>
<p id="resultat"></p>
</div>

</div>
</section>

<!-- CHIMIE -->
<section id="chimie">
<h2>Chimie 🧪</h2>

<div class="container">
<div class="card">
<h3>Réaction</h3>
<button onclick="showPopup('Réaction chimique en cours !')">Lancer</button>
</div>
</div>

</section>

<!-- POPUP -->
<div id="popup">
  <div id="popup-content">
    <p id="popup-text"></p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<!-- SCRIPT -->
<script>

/* ===== BACKGROUND ===== */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();

let particles = [];
for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    dx:(Math.random()-0.5),
    dy:(Math.random()-0.5)
  });
}

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x+=p.dx; p.y+=p.dy;
    ctx.fillStyle="cyan";
    ctx.fillRect(p.x,p.y,2,2);
  });

  requestAnimationFrame(animate);
}
animate();

/* ===== CHUTE LIBRE ===== */
function startFall() {
  let balle = document.getElementById("balle");
  let y=0, v=0;

  let fall = setInterval(()=>{
    v+=0.5;
    y+=v;
    balle.style.top=y+"px";

    if(y>130) clearInterval(fall);
  },20);
}

/* ===== PENDULE ===== */
function startPendule() {
  let p = document.getElementById("pendule");
  let angle=-30, dir=1;

  setInterval(()=>{
    angle+=dir*2;
    if(angle>30||angle<-30) dir*=-1;
    p.style.transform="rotate("+angle+"deg)";
  },30);
}

/* ===== ELECTRICITE ===== */
function testConducteur(type){
  let r=document.getElementById("resultat");
  r.innerText = (type==="metal") ? "✔ Conducteur" : "✖ Isolant";
}

/* ===== POPUP ===== */
function showPopup(text){
  document.getElementById("popup").style.display="flex";
  document.getElementById("popup-text").innerText=text;
}
function closePopup(){
  document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
