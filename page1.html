<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ScienceLab</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    color: white;
    height: 100vh;
    overflow: hidden;
    background: url("https://images.unsplash.com/photo-1502139214982-d0ad755818d8") no-repeat center/cover;
}

/* Overlay sombre */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
}

/* 💡 Lumière */
.light {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 400px;
    height: 600px;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.25), transparent 70%);
    filter: blur(50px);
}

/* 🧭 Navbar */
.navbar {
    position: absolute;
    top: 20px;
    width: 100%;
    display: flex;
    justify-content: center;
    z-index: 2;
}

.navbar ul {
    display: flex;
    gap: 30px;
    list-style: none;
    background: rgba(255,255,255,0.05);
    padding: 10px 25px;
    border-radius: 30px;
    backdrop-filter: blur(10px);
}

.navbar li {
    cursor: pointer;
    transition: 0.3s;
}

.navbar li:hover {
    color: #8ab4ff;
}

/* 📦 Contenu */
.container {
    position: relative;
    z-index: 2;
    text-align: center;
    top: 50%;
    transform: translateY(-50%);
}

/* 🧠 Titre */
h1 {
    font-size: 70px;
    letter-spacing: 4px;
    text-shadow: 0 0 25px rgba(255,255,255,0.6);
}

/* 📝 Texte */
p {
    margin-top: 15px;
    color: #ccc;
    font-size: 18px;
}

/* 🚀 Bouton */
button {
    margin-top: 30px;
    padding: 14px 35px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #6ea8ff, #a66eff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 30px rgba(120,160,255,0.9);
}

/* 📱 Responsive */
@media (max-width: 600px) {
    h1 {
        font-size: 40px;
    }
}
</style>
</head>

<body>

<div class="overlay"></div>
<div class="light"></div>

<!-- Navbar -->
<div class="navbar">
    <ul>
        <li>Accueil</li>
        <li>Expériences</li>
        <li>Contact</li>
    </ul>
</div>

<!-- Contenu -->
<div class="container">
    <h1>ScienceLab</h1>
    <p>Where science meets the future</p>
    <button onclick="alert('Bienvenue dans ScienceLab 🚀')">Commencer</button>
</div>

</body>
</html>
